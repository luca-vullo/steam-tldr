# Builds the extension and attaches a ready-to-install zip to the GitHub
# Release whenever a v* tag is pushed. Uses only first-party tooling (gh CLI
# preinstalled on runners) — no third-party actions beyond checkout/setup-node.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (typecheck + bundle)
        run: npm run build

      - name: Package dist
        run: |
          cd dist
          zip -r "../steam-tldr-${GITHUB_REF_NAME}.zip" .

      - name: Create release with the zip attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "steam-tldr-${GITHUB_REF_NAME}.zip" \
            --title "Steam TL;DR $GITHUB_REF_NAME" \
            --generate-notes
