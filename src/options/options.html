<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Steam TL;DR</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 620px; margin: 2rem auto; padding: 0 1rem; }
      h2 { margin-top: 2rem; border-bottom: 1px solid #ddd; padding-bottom: 0.25rem; }
      label { display: block; margin-top: 1rem; font-weight: 600; }
      input, select { width: 100%; padding: 0.4rem; margin-top: 0.25rem; box-sizing: border-box; }
      button { margin-top: 1rem; padding: 0.4rem 1.2rem; }
      #status { margin-left: 0.75rem; color: green; }
      .hint { font-size: 0.85rem; color: #666; margin: 0.25rem 0 0; }
      #profileList { list-style: none; padding: 0; }
      #profileList li { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0; border-bottom: 1px solid #eee; }
      #profileList .grow { flex: 1; }
      #profileList .meta { color: #666; font-size: 0.85rem; }
      #profileList button { margin: 0; padding: 0.2rem 0.6rem; }
      .hidden { display: none; }
      .check { display: flex; align-items: center; gap: 0.5rem; }
      .check input { width: auto; margin: 0; }
    </style>
  </head>
  <body>
    <h1 data-i18n="extName"></h1>

    <h2 data-i18n="optionsProfilesSection"></h2>
    <ul id="profileList"></ul>

    <h3 data-i18n="optionsProfileEditor"></h3>
    <label for="profileName" data-i18n="optionsProfileName"></label>
    <input type="text" id="profileName" />

    <label for="preset" data-i18n="optionsProfileKind"></label>
    <select id="preset">
      <option value="anthropic">Anthropic API</option>
      <option value="anthropic_foundry">Claude — Azure AI Foundry</option>
      <option value="openai">OpenAI</option>
      <option value="openai_azure">OpenAI — Azure AI Foundry</option>
      <option value="gemini">Google Gemini</option>
      <option value="local">OpenAI-compatible — local (Ollama, LM Studio…)</option>
    </select>

    <div id="baseUrlRow">
      <label for="baseUrl" data-i18n="optionsEndpoint"></label>
      <input type="url" id="baseUrl" />
      <p class="hint" id="baseUrlHint"></p>
    </div>

    <label for="apiKey" data-i18n="optionsApiKey"></label>
    <input type="password" id="apiKey" autocomplete="off" />
    <p class="hint" data-i18n="optionsApiKeyHint"></p>

    <label for="model" data-i18n="optionsModel"></label>
    <input type="text" id="model" />
    <p class="hint" data-i18n="optionsModelHint"></p>

    <button id="saveProfile" data-i18n="optionsSaveProfile"></button>
    <button id="resetForm" data-i18n="optionsNewProfile"></button>
    <span id="status"></span>

    <h2 data-i18n="optionsGeneralSection"></h2>
    <label for="language" data-i18n="optionsLanguage"></label>
    <select id="language">
      <option value="it">Italiano</option>
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
    </select>

    <label for="mode" data-i18n="optionsMode"></label>
    <select id="mode">
      <option value="hybrid">Hybrid</option>
      <option value="recent_scored">Recent + scoring</option>
      <option value="steam_native">Steam native</option>
    </select>

    <label for="numReviews" data-i18n="optionsNumReviews"></label>
    <input type="number" id="numReviews" min="5" max="200" />

    <label class="check"><input type="checkbox" id="autoGenerate" /><span data-i18n="optionsAutoGenerate"></span></label>

    <button id="saveGeneral" data-i18n="optionsSave"></button>
    <span id="statusGeneral"></span>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
