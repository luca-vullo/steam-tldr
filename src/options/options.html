<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Steam TL;DR</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
      label { display: block; margin-top: 1rem; font-weight: 600; }
      input, select { width: 100%; padding: 0.4rem; margin-top: 0.25rem; box-sizing: border-box; }
      button { margin-top: 1.5rem; padding: 0.5rem 1.5rem; }
      #status { margin-left: 0.75rem; color: green; }
      .hint { font-size: 0.85rem; color: #666; margin: 0.25rem 0 0; }
    </style>
  </head>
  <body>
    <h1 data-i18n="extName"></h1>

    <h2 data-i18n="optionsProviderSection"></h2>
    <label for="apiKey" data-i18n="optionsApiKey"></label>
    <input type="password" id="apiKey" autocomplete="off" />
    <p class="hint" data-i18n="optionsApiKeyHint"></p>

    <label for="model" data-i18n="optionsModel"></label>
    <input type="text" id="model" placeholder="claude-opus-4-8" />

    <h2 data-i18n="optionsGeneralSection"></h2>
    <label for="language" data-i18n="optionsLanguage"></label>
    <select id="language">
      <option value="it">Italiano</option>
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
    </select>

    <label for="mode" data-i18n="optionsMode"></label>
    <select id="mode">
      <option value="hybrid">Hybrid</option>
      <option value="recent_scored">Recent + scoring</option>
      <option value="steam_native">Steam native</option>
    </select>

    <label for="numReviews" data-i18n="optionsNumReviews"></label>
    <input type="number" id="numReviews" min="5" max="200" />

    <button id="save" data-i18n="optionsSave"></button><span id="status"></span>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
